<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#27ae60">

<title>Cardápio</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div id="avisoFechado" class="aviso-fechado"></div>

<div class="topo">

    <img src="img/logo.png" class="logo">

    <div class="info-topo">
        <h1>Cardápio</h1>
        <p id="statusLoja" class="status-loja"></p>
    </div>

</div>

<div class="categorias">

    <button onclick="mostrarCategoria('entradas')">Entradas</button>
    <button onclick="mostrarCategoria('quentinhas')">Quentinhas</button>
    <button onclick="mostrarCategoria('churrascos')">Churrascos</button>
    <button onclick="mostrarCategoria('parmegiana')">Parmegiana</button>
    <button onclick="mostrarCategoria('bebidas')">Bebidas</button>

</div>

<div id="produtos" class="produtos-container"></div>

<div class="pedido-container">

    <h2>Seu Pedido</h2>

    <div id="listaPedido"></div>

    <div class="total">
        Total: R$ <span id="total">0</span>
    </div>

    <div class="botoesPedido">
        <button class="confirmar" onclick="confirmarPedido()">
            Finalizar pedido
        </button>
    </div>

</div>

<div id="aviso" class="aviso">Produto adicionado</div>

<div id="carrinhoBar" class="carrinho-bar" onclick="abrirCarrinho()">
    <span id="resumoCarrinho">
        Ver pedido • R$0
    </span>
</div>

<script src="data/produtos.js"></script>
<script src="js/script.js"></script>

<script>
window.addEventListener("load", function(){

    const status = document.getElementById("statusLoja")

    if (typeof restauranteAberto === "function") {
        if (restauranteAberto()) {
            status.innerText = "🟢 Aberto agora"
            status.classList.add("aberto")
        } else {
            status.innerText = "🔴 Fechado agora"
            status.classList.add("fechado")
        }
    }

})
</script>

</body>
</html>
